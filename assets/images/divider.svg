  <path class="line" d="M 20 10 Q 80 7, 140 11 Q 200 15, 260 9 Q 320 4, 380 12 Q 440 17, 500 9 Q 560 5, 580 10"/>
  <circle class="dot" cx="14" cy="10" r="1.8"/>
