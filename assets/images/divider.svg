<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 20">
  <defs>
    <style>
      .line { fill: none; stroke: #b8a898; stroke-width: 0.9; stroke-linecap: round; filter: url(#sk); }
      .fallback { fill: none; stroke: #b8a898; stroke-width: 0.5; stroke-linecap: round; opacity: 0.4; }
      .dot { fill: #b8a898; opacity: 0.5; filter: url(#sk); }
      .dot-fb { fill: #b8a898; opacity: 0.3; }
    </style>
    <filter id="sk" x="-5%" y="-50%" width="110%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="n" seed="57"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Fallback: double wobbly line — works without filter -->
  <path class="fallback" d="M 18 9 Q 78 6, 138 10 Q 198 14, 258 8 Q 318 3, 378 12 Q 438 18, 498 8 Q 558 3, 582 9"/>
  <path class="fallback" d="M 22 11 Q 82 14, 142 10 Q 202 7, 262 12 Q 322 18, 382 9 Q 442 4, 502 13 Q 562 17, 578 11"/>
  <!-- Filtered line: adds wobble on capable browsers -->
  <path class="line" d="M 20 10 Q 80 7, 140 11 Q 200 15, 260 9 Q 320 4, 380 12 Q 440 17, 500 9 Q 560 5, 580 10"/>
  <circle class="dot" cx="14" cy="10" r="1.8"/>
  <circle class="dot" cx="586" cy="10" r="1.8"/>
  <circle class="dot-fb" cx="14" cy="10" r="1.5"/>
  <circle class="dot-fb" cx="586" cy="10" r="1.5"/>
</svg>
